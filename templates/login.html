{% extends "base.html" %}

{% block title %}用户登录 - 埋地钢质管道腐蚀防护系统质量等级评价{% endblock %}

{% block extra_css %}
<style>
    .login-wrapper {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: calc(100vh - 112px);
        padding: 20px;
    }

    .login-card {
        background: #fff;
        border-radius: 8px;
        padding: 32px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
        width: 100%;
        max-width: 420px;
    }

    .login-card h1 {
        font-size: 1.25rem;
        margin: 0 0 8px;
        color: #1a1a1a;
        text-align: center;
    }

    .login-card h2 {
        font-size: 0.95rem;
        margin: 0 0 24px;
        color: #595959;
        text-align: center;
        font-weight: normal;
    }

    .login-card .form-group {
        margin-bottom: 16px;
    }

    .login-card input[type="text"],
    .login-card input[type="password"] {
        width: 100%;
        padding: 10px 12px;
    }

    .login-card button[type="submit"] {
        width: 100%;
        margin-top: 8px;
    }

    .login-hint {
        font-size: 0.85rem;
        color: #8c8c8c;
        text-align: center;
        margin-top: 16px;
    }

    .alert.show {
        display: block;
    }
</style>
{% endblock %}

{% block content %}
<div class="login-wrapper">
    <div class="login-card">
        <h1>埋地钢质管道腐蚀防护系统</h1>
        <h2>质量等级评价系统登录</h2>

        {% if error %}
        <div class="alert alert-error show">{{ error }}</div>
        {% endif %}

        <form id="loginForm" action="{{ url_for('login') }}" method="POST">
            <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" id="username" name="username" required autocomplete="username" placeholder="请输入用户名">
            </div>
            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="请输入密码">
            </div>
            <button type="submit" class="btn">登录</button>
        </form>
        <div class="login-hint">默认用户名：admin，默认密码：admin123</div>
    </div>
</div>
{% endblock %}
