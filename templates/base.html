<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}埋地钢质管道腐蚀防护系统质量等级评价{% endblock %}</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", "PingFang SC", sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f5f6f7;
            color: #333;
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 导航栏 */
        .navbar {
            background: #fff;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .navbar-inner {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .navbar-brand {
            font-size: 1.1rem;
            font-weight: 600;
            color: #1a1a1a;
            text-decoration: none;
            white-space: nowrap;
        }

        .navbar-brand:hover {
            color: #1890ff;
        }

        .navbar-nav {
            display: flex;
            align-items: center;
            gap: 4px;
            list-style: none;
            margin: 0;
            padding: 0;
        }

        .navbar-nav a {
            color: #595959;
            text-decoration: none;
            padding: 8px 12px;
            border-radius: 4px;
            transition: background-color 0.2s, color 0.2s;
            font-size: 0.95rem;
        }

        .navbar-nav a:hover {
            background-color: #f5f5f5;
            color: #1890ff;
        }

        .navbar-nav a.active {
            color: #1890ff;
            font-weight: 500;
            background-color: #e6f7ff;
        }

        /* 主内容区 */
        .main-container {
            flex: 1;
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
            padding: 24px 20px;
        }

        .page-header {
            margin-bottom: 24px;
        }

        .page-header h1 {
            font-size: 1.5rem;
            margin: 0;
            color: #1a1a1a;
        }

        .page-header p {
            margin: 8px 0 0;
            color: #595959;
        }

        /* 卡片 */
        .card {
            background: #fff;
            border-radius: 8px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
            margin-bottom: 20px;
        }

        /* 按钮 */
        .btn {
            display: inline-block;
            background-color: #1890ff;
            color: #fff;
            border: none;
            border-radius: 4px;
            padding: 8px 16px;
            font-size: 0.95rem;
            cursor: pointer;
            text-decoration: none;
            transition: background-color 0.2s, border-color 0.2s, color 0.2s;
            line-height: 1.4;
        }

        .btn:hover {
            background-color: #40a9ff;
        }

        .btn:active {
            background-color: #096dd9;
        }

        .btn-secondary {
            background-color: #fff;
            color: #595959;
            border: 1px solid #d9d9d9;
        }

        .btn-secondary:hover {
            background-color: #f5f5f5;
            color: #1890ff;
            border-color: #1890ff;
        }

        .btn-danger {
            background-color: #ff4d4f;
            color: #fff;
        }

        .btn-danger:hover {
            background-color: #ff7875;
        }

        .btn-sm {
            padding: 4px 12px;
            font-size: 0.85rem;
        }

        /* 表单基础 */
        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 0.95rem;
            color: #262626;
        }

        input[type="text"],
        input[type="password"],
        input[type="number"],
        input[type="email"] {
            padding: 8px 10px;
            border: 1px solid #d9d9d9;
            border-radius: 4px;
            font-size: 0.95rem;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input[type="text"]:focus,
        input[type="password"]:focus,
        input[type="number"]:focus,
        input[type="email"]:focus {
            outline: none;
            border-color: #40a9ff;
            box-shadow: 0 0 0 2px rgba(24, 144, 255, 0.15);
        }

        input::placeholder {
            color: #bfbfbf;
        }

        /* 表格 */
        .data-table {
            width: 100%;
            border-collapse: collapse;
            background: #fff;
            font-size: 0.9rem;
        }

        .data-table th,
        .data-table td {
            border: 1px solid #d9d9d9;
            padding: 10px 12px;
            text-align: left;
            vertical-align: middle;
        }

        .data-table th {
            background: #fafafa;
            font-weight: 600;
        }

        .data-table tbody tr:hover {
            background: #f5f5f5;
        }

        /* 提示消息 */
        .alert {
            padding: 12px 16px;
            border-radius: 4px;
            margin-bottom: 16px;
        }

        .alert-error {
            color: #cf1322;
            background: #fff1f0;
            border: 1px solid #ffa39e;
        }

        .alert-success {
            color: #389e0d;
            background: #f6ffed;
            border: 1px solid #b7eb8f;
        }

        /* 页脚 */
        .site-footer {
            text-align: center;
            padding: 20px;
            color: #8c8c8c;
            font-size: 0.85rem;
            background: #fff;
            border-top: 1px solid #f0f0f0;
        }

        @media (max-width: 640px) {
            .navbar-inner {
                height: auto;
                padding: 12px 16px;
                flex-wrap: wrap;
                gap: 8px;
            }

            .navbar-nav {
                gap: 4px;
                width: 100%;
                justify-content: flex-end;
            }

            .main-container {
                padding: 16px;
            }

            .page-header h1 {
                font-size: 1.25rem;
            }
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    {% if session.get("logged_in") %}
    <nav class="navbar">
        <div class="navbar-inner">
            <a href="{{ url_for('index') }}" class="navbar-brand">腐蚀防护评价系统</a>
            <ul class="navbar-nav">
                <li><a href="{{ url_for('index') }}" class="{% if active_page == 'index' %}active{% endif %}">评价计算</a></li>
                {% if session.get("is_admin") %}
                <li><a href="{{ url_for('user_list') }}" class="{% if active_page == 'users' %}active{% endif %}">用户管理</a></li>
                {% endif %}
                <li><a href="{{ url_for('change_password') }}" class="{% if active_page == 'change_password' %}active{% endif %}">修改密码</a></li>
                <li><a href="{{ url_for('logout') }}">退出登录</a></li>
            </ul>
        </div>
    </nav>
    {% endif %}

    <main class="main-container">
        {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
        基于 GB/T 19285-2026 的埋地钢质管道腐蚀防护系统质量等级评价
    </footer>

    {% block extra_js %}{% endblock %}
</body>
</html>
