{% extends "base.html" %}

{% block title %}修改密码 - 埋地钢质管道腐蚀防护系统质量等级评价{% endblock %}

{% block extra_css %}
<style>
    .change-password-page {
        max-width: 480px;
        margin: 0 auto;
    }

    .change-password-page .card {
        padding: 32px;
    }

    .change-password-page h2 {
        margin-top: 0;
        margin-bottom: 8px;
        font-size: 1.25rem;
        color: #1a1a1a;
    }

    .change-password-page .subtitle {
        color: #595959;
        font-size: 0.9rem;
        margin-bottom: 24px;
    }

    .change-password-page .form-group {
        margin-bottom: 16px;
    }

    .change-password-page input[type="password"] {
        width: 100%;
        padding: 10px 12px;
    }

    .change-password-page .actions {
        display: flex;
        gap: 12px;
        margin-top: 24px;
    }

    .change-password-page .actions .btn {
        flex: 1;
    }
</style>
{% endblock %}

{% block content %}
<div class="change-password-page">
    <div class="card">
        <h2>修改密码</h2>
        <p class="subtitle">当前用户：{{ session.get("username") }}</p>

        {% if error %}
        <div class="alert alert-error">{{ error }}</div>
        {% endif %}

        {% if success %}
        <div class="alert alert-success">{{ success }}</div>
        {% endif %}

        <form action="{{ url_for('change_password') }}" method="POST">
            <div class="form-group">
                <label for="old_password">原密码</label>
                <input type="password" id="old_password" name="old_password" required autocomplete="current-password" placeholder="请输入原密码">
            </div>
            <div class="form-group">
                <label for="new_password">新密码</label>
                <input type="password" id="new_password" name="new_password" required autocomplete="new-password" placeholder="请输入新密码">
            </div>
            <div class="form-group">
                <label for="confirm_password">确认新密码</label>
                <input type="password" id="confirm_password" name="confirm_password" required autocomplete="new-password" placeholder="请再次输入新密码">
            </div>
            <div class="actions">
                <button type="submit" class="btn">保存修改</button>
                <a href="{{ url_for('index') }}" class="btn btn-secondary">返回首页</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
